name: Sync docs and blog

on:
  schedule:
    # Runs "At 11:00 on every day-of-week from Monday through Friday"
    - cron: '0 20 * * *'
  workflow_dispatch:
    
jobs:
  # Build job
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Sync docs from source repositories
        uses: bndynet/github-action-sync-repo-files@v1
        with:
          token: ${{ secrets.SYNC_REPO_FILES_TOKEN || github.token }}
          commit-message: 'chore: auto-sync docs [skip ci]'
          mappings: |
            bndynet/icharts@main:docs => docs/icharts clean
            bndynet/icharts@main:README.md => docs/icharts/index.md :: ([\[(])docs/ => $1./
            bndynet/ichat@main:docs => docs/ichat clean
            bndynet/ichat@main:README.md => docs/ichat/index.md :: ([\[(])docs/ => $1./
            bndynet/sse-parser@main:README.md => docs/sse-parser/index.md
            bndynet/layout@main:README.md => docs/layout/index.md
            bndynet/color-hub@main:README.md => docs/color-hub/index.md

      - name: Generate posts
        uses: bndynet/github-action-notion@v4
        with:
          notion-token: ${{ secrets.NOTION_TOKEN}}
          root-page-id: ${{ secrets.NOTION_ROOT_PAGE_ID }}
          md-dir: ./blog/
          download-assets: 'true'
          assets-dir: ./static/notion/
          asset-link-base: /notion/
          cleanup-before: true
          output-page-count: '0'

      - name: Commit blog
        uses: EndBug/add-and-commit@v10  # https://github.com/marketplace/actions/add-commit
        with:
          add: 'blog static/notion'
          message: 'chore: auto-sync blog'
          committer_name: 'github-actions[bot]'
          committer_email: '41898282+github-actions[bot]@users.noreply.github.com'
